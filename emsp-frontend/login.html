<!doctype html>
<html lang="fr" data-bs-theme="blue-theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMSP — Connexion</title>
  <meta name="description" content="Connectez-vous à votre espace EMSP - École Supérieure Postale d'Abidjan">
  <!--favicon-->
  <link rel="icon" href="dashboard/assets/images/favicon-32x32.png" type="image/png">
  <!-- loader-->
  <link href="dashboard/assets/css/pace.min.css" rel="stylesheet">
  <script src="dashboard/assets/js/pace.min.js"></script>
  <!--plugins-->
  <link href="dashboard/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="dashboard/assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" type="text/css" href="dashboard/assets/plugins/metismenu/mm-vertical.css">
  <!--bootstrap css-->
  <link href="dashboard/assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <!--main css-->
  <link href="dashboard/assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="dashboard/sass/main.css" rel="stylesheet">
  <link href="dashboard/sass/dark-theme.css" rel="stylesheet">
  <link href="dashboard/sass/blue-theme.css" rel="stylesheet">
  <link href="dashboard/sass/responsive.css" rel="stylesheet">
</head>
<body>

  <!--authentication-->
  <div class="auth-basic-wrapper d-flex align-items-center justify-content-center">
    <div class="container-fluid my-5 my-lg-0">
      <div class="row">
         <div class="col-12 col-md-8 col-lg-6 col-xl-5 col-xxl-4 mx-auto">
          <div class="card rounded-4 mb-0 border-top border-4 border-primary border-gradient-1">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                  <h2 class="fw-bold" style="color:#0d6efd;">EMSP</h2>
                  <p class="text-muted mb-0">École Supérieure Postale d'Abidjan</p>
                </div>
                <h4 class="fw-bold">Connexion</h4>
                <p class="mb-0">Entrez vos identifiants pour accéder à votre espace</p>

                <!-- Alert container -->
                <div id="alert-container" class="mt-3"></div>

                <div class="form-body my-4">
                  <form class="row g-3" id="loginForm">
                    <div class="col-12">
                      <label for="inputEmailAddress" class="form-label">Email</label>
                      <input type="email" class="form-control" id="inputEmailAddress" placeholder="votre@email.com" required>
                    </div>
                    <div class="col-12">
                      <label for="inputChoosePassword" class="form-label">Mot de passe</label>
                      <div class="input-group" id="show_hide_password">
                        <input type="password" class="form-control border-end-0" id="inputChoosePassword" placeholder="Entrez votre mot de passe" required>
                        <a href="javascript:;" class="input-group-text bg-transparent"><i class="bi bi-eye-slash-fill"></i></a>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked">
                        <label class="form-check-label" for="flexSwitchCheckChecked">Se souvenir</label>
                      </div>
                    </div>
                    <div class="col-md-6 text-end">
                      <a href="javascript:;">Mot de passe oublié ?</a>
                    </div>
                    <div class="col-12">
                      <div class="d-grid">
                        <button type="submit" class="btn btn-grd-primary" id="loginBtn">
                          <span id="loginBtnText">Se connecter</span>
                          <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                        </button>
                      </div>
                    </div>
                  </form>
                </div>

                <div class="text-center mt-3">
                  <a href="index.html" class="text-decoration-none">← Retour au site</a>
                </div>

            </div>
          </div>
         </div>
      </div><!--end row-->
   </div>
  </div>
  <!--authentication-->

  <!--plugins-->
  <script src="dashboard/assets/js/jquery.min.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('access_token')) {
      goToDashboard();
    }

    // Toggle password visibility
    $(document).ready(function () {
      $("#show_hide_password a").on('click', function (event) {
        event.preventDefault();
        if ($('#show_hide_password input').attr("type") == "text") {
          $('#show_hide_password input').attr('type', 'password');
          $('#show_hide_password i').addClass("bi-eye-slash-fill");
          $('#show_hide_password i').removeClass("bi-eye-fill");
        } else if ($('#show_hide_password input').attr("type") == "password") {
          $('#show_hide_password input').attr('type', 'text');
          $('#show_hide_password i').removeClass("bi-eye-slash-fill");
          $('#show_hide_password i').addClass("bi-eye-fill");
        }
      });
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('inputEmailAddress').value.trim();
      const password = document.getElementById('inputChoosePassword').value;

      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginSpinner');

      btn.disabled = true;
      btnText.textContent = 'Connexion...';
      spinner.classList.remove('d-none');

      try {
        const response = await fetch(API_BASE + 'auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
          localStorage.setItem('access_token', data.access);
          localStorage.setItem('refresh_token', data.refresh);
          if (data.user) {
            localStorage.setItem('user', JSON.stringify(data.user));
          }
          goToDashboard();
        } else {
          const msg = data.detail || data.non_field_errors?.[0] || 'Identifiants incorrects';
          showAlert(msg, 'danger');
        }
      } catch (error) {
        showAlert('Impossible de se connecter au serveur. Vérifiez votre connexion.', 'danger');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Se connecter';
        spinner.classList.add('d-none');
      }
    });
  </script>

</body>
</html>
