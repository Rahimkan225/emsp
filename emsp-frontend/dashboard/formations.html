<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP — Formations</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Déconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu"><li><a href="index.html">Tableau de bord</a></li><li data-permission="formations" class="mm-active"><a href="formations.html">Formations</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><div class="d-flex justify-content-between mb-3"><h5>Gestion des formations</h5><button class="btn btn-grd-primary" id="addFormationBtn" data-bs-toggle="modal" data-bs-target="#formationModal">Ajouter</button></div><div id="alert-container"></div><div class="card rounded-4"><div class="card-body"><div class="table-responsive"><table class="table"><thead><tr><th>Ordre</th><th>Titre</th><th>Niveau</th><th>Slug</th><th>Actions</th></tr></thead><tbody id="formationsBody"><tr><td colspan="5" class="text-center text-muted">Chargement...</td></tr></tbody></table></div></div></div></div></main>
<div class="modal fade" id="formationModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="formationModalTitle">Nouvelle formation</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="modal-alert-container"></div><input type="hidden" id="formationSlugOriginal"><div class="row g-2"><div class="col-md-6"><label class="form-label">Titre</label><input class="form-control" id="formationTitre"></div><div class="col-md-6"><label class="form-label">Niveau</label><select class="form-select" id="formationNiveau"><option value="FSP">FSP</option><option value="Licence">Licence</option><option value="Master">Master</option><option value="FCQ">FCQ</option></select></div><div class="col-md-12"><label class="form-label">Description</label><textarea class="form-control" id="formationDescription" rows="3"></textarea></div><div class="col-md-6"><label class="form-label">Image URL</label><div class="input-group"><input class="form-control" id="formationImage"><button class="btn btn-outline-secondary" id="openMediaBtn" type="button">Médiathèque</button></div></div></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button><button class="btn btn-grd-primary" id="saveFormationBtn">Enregistrer</button></div></div></div></div>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('formations')){} filterSidebarMenu();
let formations=[];
document.addEventListener('DOMContentLoaded',loadFormations);
async function loadFormations(){showLoader(true);const body=document.getElementById('formationsBody');try{const d=await apiCall('formations/?page_size=300');formations=d?.results||d||[];body.innerHTML=formations.length?formations.map((f,i)=>`<tr><td>${i+1}</td><td>${f.titre||f.nom||'-'}</td><td>${f.niveau||'-'}</td><td>${f.slug||'-'}</td><td><button class="btn btn-sm btn-outline-secondary me-1" onclick="moveFormation(${i},-1)">↑</button><button class="btn btn-sm btn-outline-secondary me-1" onclick="moveFormation(${i},1)">↓</button><button class="btn btn-sm btn-outline-primary me-1" onclick="editFormation('${f.slug}')">Modifier</button><button class="btn btn-sm btn-outline-danger" onclick="removeFormation('${f.slug}')">Supprimer</button></td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">Aucune formation</td></tr>';}catch(e){body.innerHTML='<tr><td colspan="5" class="text-center text-danger">Erreur</td></tr>';showAlert(e?.data?.detail||'Erreur chargement formations');}finally{showLoader(false);}}
function moveFormation(index,dir){const target=index+dir;if(target<0||target>=formations.length)return;const a=formations[index],b=formations[target];formations[index]=b;formations[target]=a;const payload=formations.map((f,i)=>({slug:f.slug,order:i+1}));apiCall('formations/reorder/',{method:'POST',body:JSON.stringify({items:payload})}).then(()=>{showAlert('Ordre mis à jour','success');loadFormations();}).catch(()=>showAlert('Réordonnancement indisponible','warning'));}
document.getElementById('addFormationBtn').addEventListener('click',()=>{document.getElementById('formationModalTitle').textContent='Nouvelle formation';document.getElementById('formationSlugOriginal').value='';document.getElementById('formationTitre').value='';document.getElementById('formationNiveau').value='FSP';document.getElementById('formationDescription').value='';document.getElementById('formationImage').value='';document.getElementById('modal-alert-container').innerHTML='';});
async function editFormation(slug){try{showLoader(true);const f=await apiCall(`formations/${slug}/`);document.getElementById('formationModalTitle').textContent='Modifier formation';document.getElementById('formationSlugOriginal').value=f.slug;document.getElementById('formationTitre').value=f.titre||f.nom||'';document.getElementById('formationNiveau').value=f.niveau||'FSP';document.getElementById('formationDescription').value=f.description||f.contenu||'';document.getElementById('formationImage').value=f.image||'';new bootstrap.Modal(document.getElementById('formationModal')).show();}catch(e){showAlert(e?.data?.detail||'Erreur détail formation');}finally{showLoader(false);}}
document.getElementById('saveFormationBtn').addEventListener('click',async()=>{const slug=document.getElementById('formationSlugOriginal').value;const payload={titre:document.getElementById('formationTitre').value.trim(),niveau:document.getElementById('formationNiveau').value,description:document.getElementById('formationDescription').value.trim(),image:document.getElementById('formationImage').value.trim()||undefined};if(!payload.titre){showAlert('Titre obligatoire','danger',document.getElementById('modal-alert-container'));return;}try{if(slug){await apiCall(`formations/${slug}/`,{method:'PUT',body:JSON.stringify(payload)});}else{await apiCall('formations/',{method:'POST',body:JSON.stringify(payload)});}bootstrap.Modal.getInstance(document.getElementById('formationModal')).hide();showAlert('Formation enregistrée','success');loadFormations();}catch(e){showAlert(e?.data?.detail||'Erreur enregistrement','danger',document.getElementById('modal-alert-container'));}});
async function removeFormation(slug){try{await apiCall(`formations/${slug}/`,{method:'DELETE'});showAlert('Formation supprimée','success');loadFormations();}catch(e){showAlert(e?.data?.detail||'Erreur suppression');}}
function openMediaPicker(callback){window.__mediaPickerCallback=callback;window.open('mediatheque.html?picker=1','_blank','width=1200,height=800');}
document.getElementById('openMediaBtn').addEventListener('click',()=>openMediaPicker((url)=>{document.getElementById('formationImage').value=url;}));
</script></body></html>
