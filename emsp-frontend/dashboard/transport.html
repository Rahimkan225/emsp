<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP - Transport</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand align-items-center gap-4"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Deconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu"><li><a href="index.html">Tableau de bord</a></li><li data-permission="transport" class="mm-active"><a href="transport.html">Transport</a></li><li data-permission="comptabilite"><a href="comptabilite.html">Comptabilite</a></li><li data-permission="utilisateurs"><a href="utilisateurs.html">Utilisateurs</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><div class="d-flex justify-content-between align-items-center mb-3"><h5>Gestion du transport</h5><button class="btn btn-grd-primary" id="refreshBtn">Actualiser</button></div><div id="alert-container"></div>
<div id="adminTransport">
<div class="row mb-3"><div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted mb-0">Cars</p><h4 id="kpiCars">0</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted mb-0">Communes</p><h4 id="kpiCommunes">0</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted mb-0">Chauffeurs</p><h4 id="kpiDrivers">0</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted mb-0">Payé cette année</p><h4 id="kpiPaid">0 FCFA</h4></div></div></div></div>
<div class="card rounded-4 mb-3"><div class="card-body"><ul class="nav nav-tabs" role="tablist"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabCars">Cars</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCommunes">Communes</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabRoutes">Trajets</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabDepots">Depots</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabDrivers">Chauffeurs</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabPayments">Paiements</button></li></ul>
<div class="tab-content pt-3"><div class="tab-pane fade show active" id="tabCars"><div class="row g-2 mb-3"><div class="col-md-3"><input class="form-control" id="carLabel" placeholder="Nom du car"></div><div class="col-md-2"><input class="form-control" id="carPlate" placeholder="Immatriculation"></div><div class="col-md-2"><input type="number" class="form-control" id="carPlaces" placeholder="Places"></div><div class="col-md-2"><select class="form-select" id="carDepot"></select></div><div class="col-md-2"><select class="form-select" id="carRoute"></select></div><div class="col-md-1"><button class="btn btn-success w-100" onclick="addCar()">+</button></div></div><div id="carsTable"></div></div>
<div class="tab-pane fade" id="tabCommunes"><div class="row g-2 mb-3"><div class="col-md-3"><input class="form-control" id="communeLabel" placeholder="Commune"></div><div class="col-md-4"><input class="form-control" id="pickupPoint" placeholder="Point de ramassage"></div><div class="col-md-3"><input type="number" class="form-control" id="monthlyFee" placeholder="Frais mensuel"></div><div class="col-md-2"><button class="btn btn-success w-100" onclick="addCommune()">Ajouter</button></div></div><div id="communesTable"></div></div>
<div class="tab-pane fade" id="tabRoutes"><div class="row g-2 mb-3"><div class="col-md-3"><input class="form-control" id="routeLabel" placeholder="Libelle trajet"></div><div class="col-md-3"><select class="form-select" id="routeOrigin"></select></div><div class="col-md-2"><input type="time" class="form-control" id="routePickup"></div><div class="col-md-2"><input type="number" class="form-control" id="routeDistance" placeholder="Km"></div><div class="col-md-2"><button class="btn btn-success w-100" onclick="addRoute()">Ajouter</button></div></div><div id="routesTable"></div></div>
<div class="tab-pane fade" id="tabDepots"><div class="row g-2 mb-3"><div class="col-md-3"><input class="form-control" id="depotLabel" placeholder="Depot"></div><div class="col-md-3"><input class="form-control" id="depotCommune" placeholder="Commune"></div><div class="col-md-4"><input class="form-control" id="depotAddress" placeholder="Adresse"></div><div class="col-md-2"><button class="btn btn-success w-100" onclick="addDepot()">Ajouter</button></div></div><div id="depotsTable"></div></div>
<div class="tab-pane fade" id="tabDrivers"><div class="row g-2 mb-3"><div class="col-md-3"><input class="form-control" id="driverName" placeholder="Nom chauffeur"></div><div class="col-md-3"><input type="email" class="form-control" id="driverEmail" placeholder="Email"></div><div class="col-md-2"><input class="form-control" id="driverPhone" placeholder="Telephone"></div><div class="col-md-2"><select class="form-select" id="driverCar"></select></div><div class="col-md-2"><button class="btn btn-success w-100" onclick="addDriver()">Ajouter</button></div></div><div id="driversTable"></div></div>
<div class="tab-pane fade" id="tabPayments"><div id="paymentsTable"></div></div></div></div></div></div>
<div id="driverTransport" class="d-none"><div class="card rounded-4"><div class="card-body"><h5>Pointage chauffeur</h5><div class="row g-2"><div class="col-md-3"><input type="date" class="form-control" id="tripDate"></div><div class="col-md-3"><input type="time" class="form-control" id="departureTime"></div><div class="col-md-3"><input type="time" class="form-control" id="arrivalTime"></div><div class="col-md-3"><button class="btn btn-grd-primary w-100" onclick="saveTrip()">Enregistrer</button></div></div><div id="driverTrips" class="mt-3"></div></div></div></div>
</div></main>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('transport')){} filterSidebarMenu();
let transportData={};
document.getElementById('refreshBtn').addEventListener('click',loadTransport);
document.addEventListener('DOMContentLoaded',()=>{const u=getCurrentUser();document.getElementById('tripDate').value=new Date().toISOString().slice(0,10);if(u?.role==='CHAUFFEUR'){document.getElementById('adminTransport').classList.add('d-none');document.getElementById('driverTransport').classList.remove('d-none');loadDriverTrips();}else{loadTransport();}});
function money(v){return `${Number(v||0).toLocaleString('fr-FR')} FCFA`;}
function table(rows,cols){return `<div class="table-responsive"><table class="table align-middle"><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r)}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${cols.length}" class="text-center text-muted">Aucune donnee</td></tr>`}</tbody></table></div>`;}
function fillSelect(id,rows,label='label'){document.getElementById(id).innerHTML='<option value="">Choisir</option>'+rows.map(r=>`<option value="${r.id}">${escapeHtml(r[label]||r.label||'')}</option>`).join('');}
async function loadTransport(){showLoader(true);try{transportData=await apiCall('scolarite/admin/transport/');const s=transportData.summary||{};kpiCars.textContent=s.cars||0;kpiCommunes.textContent=s.communes||0;kpiDrivers.textContent=s.drivers||0;kpiPaid.textContent=money(s.paid_this_year);fillSelect('carDepot',transportData.depots||[]);fillSelect('carRoute',transportData.routes||[]);fillSelect('routeOrigin',transportData.communes||[]);fillSelect('driverCar',transportData.cars||[]);renderTransport();}catch(e){showAlert(e?.data?.detail||'Erreur transport');}finally{showLoader(false);}}
function renderTransport(){carsTable.innerHTML=table(transportData.cars||[],[['Car',r=>escapeHtml(r.label)],['Immat.',r=>escapeHtml(r.plate_number||'-')],['Places',r=>r.places||0],['Depot',r=>escapeHtml(r.depot_label||'-')],['Trajet',r=>escapeHtml(r.route_label||'-')]]);communesTable.innerHTML=table(transportData.communes||[],[['Commune',r=>escapeHtml(r.label)],['Point',r=>escapeHtml(r.pickup_point||'-')],['Frais mensuel',r=>money(r.monthly_fee)]]);routesTable.innerHTML=table(transportData.routes||[],[['Trajet',r=>escapeHtml(r.label)],['Depart',r=>escapeHtml(r.origin_label)],['Heure',r=>r.pickup_time||'-'],['Distance',r=>`${r.distance_km||0} km`]]);depotsTable.innerHTML=table(transportData.depots||[],[['Depot',r=>escapeHtml(r.label)],['Commune',r=>escapeHtml(r.commune||'-')],['Adresse',r=>escapeHtml(r.address||'-')]]);driversTable.innerHTML=table(transportData.drivers||[],[['Chauffeur',r=>escapeHtml(r.full_name)],['Email',r=>escapeHtml(r.email)],['Car',r=>escapeHtml(r.car_label||'-')],['Tel',r=>escapeHtml(r.phone||'-')]]);paymentsTable.innerHTML=table(transportData.payments||[],[['Etudiant',r=>escapeHtml(r.student_name)],['Matricule',r=>escapeHtml(r.matricule)],['Commune',r=>escapeHtml(r.commune_label||'-')],['Mois',r=>`${r.month||'-'}/${r.year||''}`],['Montant',r=>money(r.tarif)],['Reference',r=>escapeHtml(r.reference||'-')]]);}
async function addDepot(){await postAndReload('scolarite/admin/transport/depots/',{label:depotLabel.value,commune:depotCommune.value,address:depotAddress.value});}
async function addCommune(){await postAndReload('scolarite/admin/transport/communes/',{label:communeLabel.value,pickup_point:pickupPoint.value,monthly_fee:monthlyFee.value||0});}
async function addRoute(){await postAndReload('scolarite/admin/transport/routes/',{label:routeLabel.value,origin:routeOrigin.value,pickup_time:routePickup.value||null,distance_km:routeDistance.value||0});}
async function addCar(){await postAndReload('scolarite/admin/transport/cars/',{label:carLabel.value,plate_number:carPlate.value,places:carPlaces.value||0,depot:carDepot.value||null,route:carRoute.value||null});}
async function addDriver(){await postAndReload('scolarite/admin/transport/drivers/',{full_name:driverName.value,email:driverEmail.value,phone:driverPhone.value,car:driverCar.value||null});}
async function postAndReload(url,payload){try{await apiCall(url,{method:'POST',body:JSON.stringify(payload)});showAlert('Enregistre','success');loadTransport();}catch(e){showAlert(parseApiError(e,'Erreur enregistrement'));}}
async function loadDriverTrips(){try{const d=await apiCall('scolarite/transport/driver/trips/');driverTrips.innerHTML=table(d.trips||[],[['Date',r=>r.service_date],['Car',r=>escapeHtml(r.car_label)],['Depart',r=>r.departure_time||'-'],['Arrivee',r=>r.arrival_time||'-']]);}catch(e){showAlert(e?.data?.detail||'Erreur chauffeur');}}
async function saveTrip(){try{await apiCall('scolarite/transport/driver/trips/',{method:'POST',body:JSON.stringify({service_date:tripDate.value,departure_time:departureTime.value,arrival_time:arrivalTime.value})});showAlert('Pointage enregistre','success');loadDriverTrips();}catch(e){showAlert(parseApiError(e,'Erreur pointage'));}}
</script></body></html>
