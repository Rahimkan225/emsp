<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP — Emploi du temps</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand align-items-center gap-4"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Déconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu" id="sidenav"><li><a href="index.html">Tableau de bord</a></li><li data-permission="emploi-du-temps" class="mm-active"><a href="emploi-du-temps.html">Emploi du temps</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><div class="d-flex justify-content-between mb-3"><h5>Emploi du temps</h5><button class="btn btn-grd-primary" data-bs-toggle="modal" data-bs-target="#slotModal" id="addSlotBtn">Ajouter créneau</button></div><div id="alert-container"></div><div class="card rounded-4"><div class="card-body"><div class="table-responsive"><table class="table"><thead><tr><th>Jour</th><th>Heure</th><th>Matière</th><th>Promotion</th><th>Salle</th><th>Actions</th></tr></thead><tbody id="slotsBody"><tr><td colspan="6" class="text-center text-muted">Chargement...</td></tr></tbody></table></div><div id="slots-pagination"></div></div></div></div></main>
<div class="modal fade" id="slotModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="slotModalTitle">Nouveau créneau</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="modal-alert-container"></div><input type="hidden" id="slotId"><div class="mb-2"><label class="form-label">Jour</label><select class="form-select" id="slotJour"><option>Lundi</option><option>Mardi</option><option>Mercredi</option><option>Jeudi</option><option>Vendredi</option><option>Samedi</option></select></div><div class="mb-2"><label class="form-label">Heure début</label><input type="time" class="form-control" id="slotDebut"></div><div class="mb-2"><label class="form-label">Heure fin</label><input type="time" class="form-control" id="slotFin"></div><div class="mb-2"><label class="form-label">Matière</label><input class="form-control" id="slotMatiere"></div><div class="mb-2"><label class="form-label">Promotion</label><select class="form-select" id="slotPromotion"></select></div><div class="mb-2"><label class="form-label">Salle</label><input class="form-control" id="slotSalle"></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button><button class="btn btn-grd-primary" id="saveSlotBtn">Enregistrer</button></div></div></div></div>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('emploi-du-temps')){} filterSidebarMenu();
let currentPage=1;const pageSize=20;
document.addEventListener('DOMContentLoaded',async()=>{showLoader(true);try{const p=await apiCall('scolarite/promotions/?page_size=200');const rows=p?.results||p||[];document.getElementById('slotPromotion').innerHTML='<option value="">Choisir</option>'+rows.map(r=>`<option value="${r.id}">${r.nom||r.annee_academique}</option>`).join('');await loadSlots();}catch(e){showAlert('Erreur chargement');}finally{showLoader(false);}});
async function loadSlots(){const body=document.getElementById('slotsBody');body.innerHTML='<tr><td colspan="6" class="text-center text-muted">Chargement...</td></tr>';try{const d=await apiCall(`scolarite/emploi-du-temps/?page=${currentPage}&page_size=${pageSize}`);const rows=d?.results||d||[];const total=d?.count?Math.ceil(d.count/pageSize):1;body.innerHTML=rows.length?rows.map(r=>`<tr><td>${r.jour||'-'}</td><td>${r.heure_debut||''} - ${r.heure_fin||''}</td><td>${r.matiere_nom||r.matiere||'-'}</td><td>${r.promotion_nom||r.promotion||'-'}</td><td>${r.salle||'-'}</td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="editSlot(${r.id})">Modifier</button><button class="btn btn-sm btn-outline-danger" onclick="deleteSlot(${r.id})">Supprimer</button></td></tr>`).join(''):'<tr><td colspan="6" class="text-center text-muted">Aucun créneau</td></tr>';renderPagination('slots-pagination',currentPage,total,p=>{currentPage=p;loadSlots();});}catch(e){body.innerHTML='<tr><td colspan="6" class="text-danger text-center">Erreur</td></tr>';showAlert(e?.data?.detail||'Erreur API');}}
document.getElementById('addSlotBtn').addEventListener('click',()=>{document.getElementById('slotId').value='';document.getElementById('slotModalTitle').textContent='Nouveau créneau';document.getElementById('slotJour').value='Lundi';document.getElementById('slotDebut').value='';document.getElementById('slotFin').value='';document.getElementById('slotMatiere').value='';document.getElementById('slotPromotion').value='';document.getElementById('slotSalle').value='';document.getElementById('modal-alert-container').innerHTML='';});
async function editSlot(id){try{showLoader(true);const r=await apiCall(`scolarite/emploi-du-temps/${id}/`);document.getElementById('slotId').value=r.id;document.getElementById('slotModalTitle').textContent='Modifier créneau';document.getElementById('slotJour').value=r.jour||'Lundi';document.getElementById('slotDebut').value=r.heure_debut||'';document.getElementById('slotFin').value=r.heure_fin||'';document.getElementById('slotMatiere').value=r.matiere||r.matiere_nom||'';document.getElementById('slotPromotion').value=r.promotion||'';document.getElementById('slotSalle').value=r.salle||'';new bootstrap.Modal(document.getElementById('slotModal')).show();}catch(e){showAlert(e?.data?.detail||'Erreur détail');}finally{showLoader(false);}}
document.getElementById('saveSlotBtn').addEventListener('click',async()=>{const id=document.getElementById('slotId').value;const payload={jour:document.getElementById('slotJour').value,heure_debut:document.getElementById('slotDebut').value,heure_fin:document.getElementById('slotFin').value,matiere:document.getElementById('slotMatiere').value,promotion:document.getElementById('slotPromotion').value||undefined,salle:document.getElementById('slotSalle').value};try{if(!payload.heure_debut||!payload.heure_fin||!payload.matiere){showAlert('Champs obligatoires manquants','danger',document.getElementById('modal-alert-container'));return;}if(id){await apiCall(`scolarite/emploi-du-temps/${id}/`,{method:'PUT',body:JSON.stringify(payload)});}else{await apiCall('scolarite/emploi-du-temps/',{method:'POST',body:JSON.stringify(payload)});}bootstrap.Modal.getInstance(document.getElementById('slotModal')).hide();showAlert('Créneau enregistré','success');loadSlots();}catch(e){showAlert(e?.data?.detail||'Erreur enregistrement','danger',document.getElementById('modal-alert-container'));}});
async function deleteSlot(id){if(!confirm('Supprimer ce créneau ?')) return;try{await apiCall(`scolarite/emploi-du-temps/${id}/`,{method:'DELETE'});showAlert('Créneau supprimé','success');loadSlots();}catch(e){showAlert(e?.data?.detail||'Erreur suppression');}}
</script></body></html>
