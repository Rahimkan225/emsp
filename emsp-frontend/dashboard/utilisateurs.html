<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP - Utilisateurs</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Deconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu"><li><a href="index.html">Tableau de bord</a></li><li data-permission="utilisateurs" class="mm-active"><a href="utilisateurs.html">Utilisateurs</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><div class="d-flex justify-content-between mb-3"><h5>Gestion des utilisateurs</h5><button class="btn btn-grd-primary" id="addUserBtn" data-bs-toggle="modal" data-bs-target="#userModal">Ajouter</button></div><div id="alert-container"></div><div class="card rounded-4"><div class="card-body"><div class="table-responsive"><table class="table"><thead><tr><th>Nom</th><th>Email</th><th>Role</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="usersBody"><tr><td colspan="5" class="text-center text-muted">Chargement...</td></tr></tbody></table></div><div id="users-pagination"></div></div></div></div></main>
<div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="userModalTitle">Nouvel utilisateur</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="modal-alert-container"></div><input type="hidden" id="userId"><div class="mb-2"><label class="form-label">Nom</label><input class="form-control" id="userName"></div><div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="userEmail"></div><div class="mb-2"><label class="form-label">Role</label><select class="form-select" id="userRole"><option>ADMIN</option><option>DIRECTION</option><option>STAFF</option><option>COMPTA</option><option>ETUDIANT</option><option>ENSEIGNANT</option><option>CHAUFFEUR</option></select></div><div class="mb-2"><label class="form-label">Mot de passe</label><input type="password" class="form-control" id="userPassword"></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button><button class="btn btn-grd-primary" id="saveUserBtn">Enregistrer</button></div></div></div></div>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('utilisateurs')){} filterSidebarMenu();
let currentPage=1;const pageSize=15;
document.addEventListener('DOMContentLoaded',loadUsers);
document.getElementById('addUserBtn').addEventListener('click',()=>{userModalTitle.textContent='Nouvel utilisateur';userId.value='';userName.value='';userEmail.value='';userRole.value='STAFF';userPassword.value='';modalAlertClear();});
function modalAlertClear(){document.getElementById('modal-alert-container').innerHTML='';}
async function loadUsers(){const body=document.getElementById('usersBody');body.innerHTML='<tr><td colspan="5" class="text-center text-muted">Chargement...</td></tr>';try{const d=await apiCall(`accounts/users/?page=${currentPage}&page_size=${pageSize}`);const rows=d?.results||[];const total=d?.count?Math.ceil(d.count/pageSize):1;body.innerHTML=rows.length?rows.map(u=>`<tr><td>${escapeHtml(`${u.first_name||''} ${u.last_name||''}`.trim()||'-')}</td><td>${escapeHtml(u.email||'-')}</td><td>${escapeHtml(String(u.role||'-').toUpperCase())}</td><td>${u.is_active?'<span class="badge bg-success">Actif</span>':'<span class="badge bg-secondary">Inactif</span>'}</td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="editUser(${u.id})">Modifier</button><button class="btn btn-sm btn-outline-warning me-1" onclick="toggleUser(${u.id},${!u.is_active})">${u.is_active?'Desactiver':'Activer'}</button><button class="btn btn-sm btn-outline-info me-1" onclick="resetPassword(${u.id})">Reset MDP</button><button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">Supprimer</button></td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">Aucun utilisateur</td></tr>';renderPagination('users-pagination',currentPage,total,p=>{currentPage=p;loadUsers();});}catch(e){body.innerHTML='<tr><td colspan="5" class="text-danger text-center">Erreur</td></tr>';showAlert(parseApiError(e,'Erreur chargement utilisateurs'));}}
async function editUser(id){try{const u=await apiCall(`accounts/users/${id}/`);userModalTitle.textContent='Modifier utilisateur';userId.value=u.id;userName.value=`${u.first_name||''} ${u.last_name||''}`.trim();userEmail.value=u.email||'';userRole.value=String(u.role||'STAFF').toUpperCase();userPassword.value='';modalAlertClear();new bootstrap.Modal(document.getElementById('userModal')).show();}catch(e){showAlert(parseApiError(e,'Erreur detail'));}}
document.getElementById('saveUserBtn').addEventListener('click',async()=>{const id=userId.value;const full=userName.value.trim();const [first,...rest]=full.split(' ');const payload={first_name:first||'',last_name:rest.join(' '),email:userEmail.value.trim(),role:userRole.value};if(userPassword.value)payload.password=userPassword.value;if(!payload.email){showAlert('Email obligatoire','danger',document.getElementById('modal-alert-container'));return;}try{if(id){await apiCall(`accounts/users/${id}/`,{method:'PUT',body:JSON.stringify(payload)});}else{await apiCall('accounts/users/',{method:'POST',body:JSON.stringify(payload)});}bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();showAlert('Utilisateur enregistre','success');loadUsers();}catch(e){showAlert(parseApiError(e,'Erreur enregistrement'),'danger',document.getElementById('modal-alert-container'));}});
async function toggleUser(id,is_active){try{await apiCall(`accounts/users/${id}/`,{method:'PATCH',body:JSON.stringify({is_active})});showAlert('Statut mis a jour','success');loadUsers();}catch(e){showAlert(parseApiError(e,'Erreur statut'));}}
async function resetPassword(id){try{const r=await apiCall(`accounts/users/${id}/reset-password/`,{method:'POST'});showAlert(`Mot de passe temporaire: ${r.temporary_password||'emsp12345'}`,'success');}catch(e){showAlert(parseApiError(e,'Erreur reset mot de passe'));}}
async function deleteUser(id){if(!confirm('Supprimer cet utilisateur ?'))return;try{await apiCall(`accounts/users/${id}/`,{method:'DELETE'});showAlert('Utilisateur supprime','success');loadUsers();}catch(e){showAlert(parseApiError(e,'Erreur suppression'));}}
</script></body></html>
