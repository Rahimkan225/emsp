<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP — Notes</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/pace.min.css" rel="stylesheet"><script src="assets/js/pace.min.js"></script><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="sass/responsive.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand align-items-center gap-4"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item dropdown"><a href="javascript:;" class="dropdown-toggle dropdown-toggle-nocaret" data-bs-toggle="dropdown"><img src="assets/images/avatars/01.png" class="rounded-circle p-1 border" width="45" height="45" alt=""></a><div class="dropdown-menu dropdown-user dropdown-menu-end shadow"><a class="dropdown-item gap-2 py-2" href="javascript:;"><div class="text-center"><h5 class="user-name mb-0 fw-bold" id="dashboard-user-name">Utilisateur</h5><p class="mb-0 text-muted" id="dashboard-user-role"></p></div></a><hr class="dropdown-divider"><a class="dropdown-item d-flex align-items-center gap-2 py-2" href="javascript:;" onclick="logout()"><i class="material-icons-outlined">power_settings_new</i>Déconnexion</a></div></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><div class="logo-name flex-grow-1"><h5 class="mb-0">EMSP</h5></div></div><div class="sidebar-nav"><ul class="metismenu" id="sidenav"><li><a href="index.html"><div class="parent-icon"><i class="material-icons-outlined">home</i></div><div class="menu-title">Tableau de bord</div></a></li><li data-permission="notes" class="mm-active"><a href="notes.html"><div class="parent-icon"><i class="material-icons-outlined">grading</i></div><div class="menu-title">Notes</div></a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><h5 class="mb-3">Saisie des notes</h5><div id="alert-container"></div><div class="card rounded-4 mb-3"><div class="card-body"><div class="row g-2"><div class="col-md-5"><select class="form-select" id="promotionSelect"><option value="">Promotion</option></select></div><div class="col-md-3"><select class="form-select" id="semestreSelect"><option value="1">Semestre 1</option><option value="2">Semestre 2</option></select></div><div class="col-md-2"><button class="btn btn-outline-primary w-100" id="loadNotesBtn">Charger</button></div><div class="col-md-2"><button class="btn btn-grd-primary w-100" id="saveNotesBtn">Enregistrer</button></div></div></div></div><div class="card rounded-4"><div class="card-body"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Étudiant</th><th>Matière</th><th>Note /20</th><th>Crédits</th><th>Moyenne</th></tr></thead><tbody id="notesBody"><tr><td colspan="5" class="text-center text-muted">Sélectionnez une promotion</td></tr></tbody></table></div></div></div></div></main>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('notes')){} filterSidebarMenu();
let notesData=[];
document.addEventListener('DOMContentLoaded',async()=>{showLoader(true);try{const p=await apiCall('scolarite/promotions/?page_size=200');const rows=p?.results||p||[];document.getElementById('promotionSelect').innerHTML='<option value="">Promotion</option>'+rows.map(x=>`<option value="${x.id}">${x.nom||x.annee_academique}</option>`).join('');}catch(e){showAlert('Erreur chargement promotions');}finally{showLoader(false);}});
document.getElementById('loadNotesBtn').addEventListener('click',loadNotes);
async function loadNotes(){const promotion=document.getElementById('promotionSelect').value;const semestre=document.getElementById('semestreSelect').value;if(!promotion){showAlert('Sélectionnez une promotion','warning');return;}showLoader(true);const body=document.getElementById('notesBody');try{const data=await apiCall(`scolarite/notes/?promotion=${promotion}&semestre=${semestre}&page_size=300`);notesData=data?.results||data||[];body.innerHTML=notesData.length?notesData.map((n,i)=>`<tr><td>${n.etudiant_nom||n.etudiant||'-'}</td><td>${n.matiere_nom||n.matiere||'-'}</td><td><input type="number" min="0" max="20" step="0.01" class="form-control note-input" data-index="${i}" value="${n.note??''}"></td><td>${n.credits??0}</td><td>${(Number(n.note||0)).toFixed(2)}</td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted">Aucune note</td></tr>';updateStats();}catch(e){body.innerHTML='<tr><td colspan="5" class="text-danger text-center">Erreur de chargement</td></tr>';showAlert(e?.data?.detail||'Erreur notes');}finally{showLoader(false);}}
document.getElementById('notesBody').addEventListener('input',e=>{if(!e.target.classList.contains('note-input')) return;const idx=Number(e.target.dataset.index);notesData[idx].note=e.target.value===''?null:Number(e.target.value);const tr=e.target.closest('tr');const note=Number(notesData[idx].note||0);tr.children[4].textContent=note.toFixed(2);updateStats();});
function updateStats(){const byStudent={};notesData.forEach(n=>{const key=n.etudiant||n.etudiant_id||n.etudiant_nom;const credits=Number(n.credits||0);const note=Number(n.note||0);if(!byStudent[key])byStudent[key]={sum:0,c:0};byStudent[key].sum+=note*credits;byStudent[key].c+=credits;});}
document.getElementById('saveNotesBtn').addEventListener('click',async()=>{if(!notesData.length){showAlert('Aucune note à enregistrer','warning');return;}showLoader(true);try{for(const n of notesData){const payload={etudiant:n.etudiant,matiere:n.matiere,promotion:n.promotion,semestre:n.semestre,note:n.note};if(n.id){await apiCall(`scolarite/notes/${n.id}/`,{method:'PUT',body:JSON.stringify(payload)});}else{await apiCall('scolarite/notes/',{method:'POST',body:JSON.stringify(payload)});}}showAlert('Notes enregistrées','success');await loadNotes();}catch(e){showAlert(e?.data?.detail||'Erreur enregistrement notes');}finally{showLoader(false);}});
</script></body></html>
