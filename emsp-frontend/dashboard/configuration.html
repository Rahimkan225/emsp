<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP - Configuration</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Deconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu"><li><a href="index.html">Tableau de bord</a></li><li data-permission="configuration" class="mm-active"><a href="configuration.html">Configuration</a></li><li data-permission="utilisateurs"><a href="utilisateurs.html">Utilisateurs</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><h5 class="mb-3">Configuration du site</h5><div id="alert-container"></div><div class="card rounded-4"><div class="card-body"><form id="configForm"><div class="row g-3"><div class="col-md-6"><label class="form-label">Nom etablissement</label><input class="form-control" id="cfgNom"></div><div class="col-md-6"><label class="form-label">Slogan</label><input class="form-control" id="cfgSlogan"></div><div class="col-md-4"><label class="form-label">Email</label><input class="form-control" id="cfgEmail"></div><div class="col-md-4"><label class="form-label">Telephone</label><input class="form-control" id="cfgTel"></div><div class="col-md-4"><label class="form-label">Adresse</label><input class="form-control" id="cfgAdresse"></div><div class="col-md-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="cfgBannerVisible"><label class="form-check-label" for="cfgBannerVisible">Afficher la bande rouge</label></div></div><div class="col-md-12"><label class="form-label">Message de la bande rouge</label><textarea class="form-control" id="cfgBannerText" rows="3"></textarea></div><div class="col-md-4"><label class="form-label">Facebook</label><input class="form-control" id="cfgFacebook"></div><div class="col-md-4"><label class="form-label">LinkedIn</label><input class="form-control" id="cfgLinkedin"></div><div class="col-md-4"><label class="form-label">X/Twitter</label><input class="form-control" id="cfgTwitter"></div></div><div class="mt-4"><button class="btn btn-grd-primary" type="submit">Sauvegarder</button></div></form></div></div></div></main>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('configuration')){} filterSidebarMenu();
document.addEventListener('DOMContentLoaded',loadConfig);
async function loadConfig(){showLoader(true);try{const cfg=await apiCall('config/admin/');cfgNom.value=cfg.site_name||cfg.nom_etablissement||'';cfgSlogan.value=cfg.slogan||'';cfgEmail.value=cfg.email_contact||cfg.email||'';cfgTel.value=cfg.phone_1||cfg.telephone||'';cfgAdresse.value=cfg.address||cfg.adresse||'';cfgBannerVisible.checked=Boolean(cfg.show_homepage_banner);cfgBannerText.value=cfg.homepage_banner_text||'';cfgFacebook.value=cfg.facebook_url||'';cfgLinkedin.value=cfg.linkedin_url||'';cfgTwitter.value=cfg.twitter_url||'';}catch(e){showAlert(parseApiError(e,'Erreur chargement configuration'));}finally{showLoader(false);}}
document.getElementById('configForm').addEventListener('submit',async(e)=>{e.preventDefault();const payload={site_name:cfgNom.value.trim(),slogan:cfgSlogan.value.trim(),email_contact:cfgEmail.value.trim(),phone_1:cfgTel.value.trim(),address:cfgAdresse.value.trim(),show_homepage_banner:cfgBannerVisible.checked,homepage_banner_text:cfgBannerText.value.trim(),facebook_url:cfgFacebook.value.trim(),linkedin_url:cfgLinkedin.value.trim(),twitter_url:cfgTwitter.value.trim()};try{await apiCall('config/admin/',{method:'PATCH',body:JSON.stringify(payload)});showAlert('Configuration sauvegardee','success');}catch(err){showAlert(parseApiError(err,'Erreur sauvegarde'));}});
</script></body></html>
