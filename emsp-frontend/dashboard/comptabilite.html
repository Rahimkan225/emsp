<!doctype html><html lang="fr" data-bs-theme="blue-theme"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EMSP - Comptabilite</title><link rel="icon" href="assets/images/favicon-32x32.png" type="image/png"><link href="assets/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/bootstrap-extended.css" rel="stylesheet"><link href="sass/main.css" rel="stylesheet"><link href="sass/blue-theme.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet"></head>
<body><header class="top-header"><nav class="navbar navbar-expand align-items-center gap-4"><div class="btn-toggle"><a href="javascript:;"><i class="material-icons-outlined">menu</i></a></div><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="javascript:;" onclick="logout()">Deconnexion</a></li></ul></nav></header>
<aside class="sidebar-wrapper" data-simplebar="true"><div class="sidebar-header"><h5 class="mb-0">EMSP</h5></div><div class="sidebar-nav"><ul class="metismenu"><li><a href="index.html">Tableau de bord</a></li><li data-permission="comptabilite" class="mm-active"><a href="comptabilite.html">Comptabilite</a></li><li data-permission="transport"><a href="transport.html">Transport</a></li></ul></div></aside>
<main class="main-wrapper"><div class="main-content"><h5 class="mb-3">Comptabilite</h5><div id="alert-container"></div><div class="row mb-3"><div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted">Total paye</div><h4 id="kpiPaid">0 FCFA</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted">Reste du</div><h4 id="kpiDue">0 FCFA</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted">Etudiants</div><h4 id="kpiStudents">0</h4></div></div></div><div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted">Filieres</div><h4 id="kpiFormations">0</h4></div></div></div></div>
<div class="card rounded-4 mb-3"><div class="card-body"><ul class="nav nav-tabs"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAudit">Audit etudiants</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabFormations">Cumule filieres</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabTransactions">Transactions Mobile Money</button></li></ul><div class="tab-content pt-3"><div class="tab-pane fade show active" id="tabAudit"><div id="studentsAudit"></div></div><div class="tab-pane fade" id="tabFormations"><div id="formationsAudit"></div></div><div class="tab-pane fade" id="tabTransactions"><div class="d-flex justify-content-end mb-2"><button class="btn btn-outline-success" id="btnExportCsv">Exporter CSV</button></div><div id="paymentsAudit"></div></div></div></div></div></div></main>
<script src="assets/js/bootstrap.bundle.min.js"></script><script src="assets/js/jquery.min.js"></script><script src="assets/plugins/metismenu/metisMenu.min.js"></script><script src="assets/js/main.js"></script><script src="../js/auth.js"></script><script src="js/dashboard-api.js"></script>
<script>
if(!requireAuth()){} if(!checkPermission('comptabilite')){} filterSidebarMenu();
let audit={};
document.addEventListener('DOMContentLoaded',loadAudit);
function money(v){return `${Number(v||0).toLocaleString('fr-FR')} FCFA`;}
function table(rows,cols){return `<div class="table-responsive"><table class="table align-middle"><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r)}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${cols.length}" class="text-center text-muted">Aucune donnee</td></tr>`}</tbody></table></div>`;}
async function loadAudit(){showLoader(true);try{audit=await apiCall('comptabilite/audit/');const s=audit.summary||{};kpiPaid.textContent=money(s.paid_total);kpiDue.textContent=money(s.due_total);kpiStudents.textContent=s.students||0;kpiFormations.textContent=s.formations||0;renderAudit();}catch(e){showAlert(parseApiError(e,'Erreur comptabilite'));}finally{showLoader(false);}}
function renderAudit(){studentsAudit.innerHTML=table(audit.students||[],[['Matricule',r=>escapeHtml(r.matricule)],['Etudiant',r=>escapeHtml(r.student_name)],['Filiere',r=>escapeHtml(r.formation_name)],['Promotion',r=>escapeHtml(r.promotion_label||'-')],['Paye',r=>money(r.paid_total)],['Doit',r=>money(r.due_total)]]);formationsAudit.innerHTML=table(audit.formations||[],[['Filiere',r=>escapeHtml(r.formation_name)],['Etudiants',r=>r.students],['Total paye',r=>money(r.paid_total)],['Reste du',r=>money(r.due_total)]]);paymentsAudit.innerHTML=table(audit.payments||[],[['Reference',r=>escapeHtml(r.reference||'-')],['Etudiant',r=>escapeHtml(r.etudiant_nom||r.student_name||'-')],['Montant',r=>money(r.montant)],['Operateur',r=>escapeHtml(String(r.operateur||'-').toUpperCase())],['Statut',r=>escapeHtml(r.status_label||r.statut)],['Date',r=>formatDateShort(r.created_at)]]);}
document.getElementById('btnExportCsv').addEventListener('click',()=>{const rows=(audit.payments||[]).map(r=>({reference:r.reference,etudiant:r.etudiant_nom||r.student_name,montant:r.montant,operateur:r.operateur,statut:r.statut,date:r.created_at}));exportToCSV(rows,'audit-paiements.csv',['reference','etudiant','montant','operateur','statut','date']);});
</script></body></html>
