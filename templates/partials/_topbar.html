<div class="top-bar">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-8">
        <ul class="d-flex gap-3 list-unstyled m-0 py-2">
          <li><a href="tel:{{ site.phone_1|default:'' }}" aria-label="Telephone principal">{{ site.phone_1 }}</a></li>
          <li><a href="mailto:{{ site.email_contact|default:'' }}" aria-label="Email de contact">{{ site.email_contact }}</a></li>
        </ul>
      </div>
      <div class="col-lg-4 text-end">
        {% if site.facebook_url %}<a href="{{ site.facebook_url }}" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>{% endif %}
        {% if site.twitter_url %}<a href="{{ site.twitter_url }}" aria-label="Twitter"><i class="fab fa-twitter"></i></a>{% endif %}
        {% if site.linkedin_url %}<a href="{{ site.linkedin_url }}" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>{% endif %}
        {% if site.youtube_url %}<a href="{{ site.youtube_url }}" aria-label="Youtube"><i class="fab fa-youtube"></i></a>{% endif %}
      </div>
    </div>
  </div>
</div>
