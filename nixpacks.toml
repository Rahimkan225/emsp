providers = ["python", "node"]

[phases.setup]
nixPkgs = [
  "python311",
  "nodejs_20",
  "pkg-config",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "libffi",
]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements.txt",
  "cd emsp2-frontend && npm ci",
]

[phases.build]
cmds = [
  "cd emsp2-frontend && npm run build",
  "python manage.py collectstatic --noinput",
]

[start]
cmd = "python manage.py migrate && gunicorn emsp1.wsgi:application --bind 0.0.0.0:$PORT"
